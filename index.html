<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EfectivoYa - Solicitud Segura</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background-color: #f4f7f6; padding: 20px; }
        .container { max-width: 450px; margin: auto; background: white; padding: 25px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: #1e293b; margin-bottom: 20px; }
        .input-field { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #cbd5e1; border-radius: 8px; }
        .file-label { display: block; padding: 12px; background: #f1f5f9; border: 2px dashed #cbd5e1; margin: 10px 0; cursor: pointer; text-align: center; color: #64748b; }
        .btn-submit { width: 100%; padding: 15px; background: #10b981; color: white; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="container">
        <h2>Solicitud de Crédito</h2>
        <form id="loanForm" onsubmit="analizarSolicitud(event)">
            <input type="text" id="nombre" class="input-field" placeholder="Nombre Completo" required>
            <input type="number" id="cedula" class="input-field" placeholder="Número de Cédula" required>
            <input type="number" id="ingresos" class="input-field" placeholder="Ingresos Mensuales ($)" required>
            <input type="number" id="gastos" class="input-field" placeholder="Gastos Mensuales Fijos ($)" required>
            
            <label class="file-label">Foto Cédula (FRENTE)<input type="file" id="frente" required style="display:none"></label>
            <label class="file-label">Foto Cédula (RESPALDO)<input type="file" id="respaldo" required style="display:none"></label>
            
            <button type="submit" class="btn-submit">Analizar y Enviar Solicitud</button>
        </form>
    </div>

    <script>
        function analizarSolicitud(event) {
            event.preventDefault();
            
            const ingresos = parseInt(document.getElementById('ingresos').value);
            const gastos = parseInt(document.getElementById('gastos').value);
            
            // FILTRO DE RIESGO: Si gastos > 70% de ingresos, rechazo automático
            if (gastos > (ingresos * 0.7)) {
                alert("⚠️ Lo sentimos, tus gastos actuales superan nuestra política de riesgo para nuevos créditos. Intenta ajustar tus finanzas y solicita nuevamente.");
                return;
            }

            // Validar fotos
            if (document.getElementById('frente').files.length === 0 || document.getElementById('respaldo').files.length === 0) {
                alert("⚠️ Debes adjuntar ambas fotos de tu cédula.");
                return;
            }

            const nombre = document.getElementById('nombre').value;
            const cedula = document.getElementById('cedula').value;
            const texto = `*NUEVA SOLICITUD - EFECTIVOYA*%0A%0A👤 Nombre: ${nombre}%0A🪪 Cédula: ${cedula}%0A💰 Ingresos: $${ingresos}%0A📉 Gastos: $${gastos}%0A%0A_El cliente pasó el filtro de riesgo._`;
            
            window.location.href = "https://wa.me/573148934475?text=" + texto;
        }
    </script>
</body>
</html>
